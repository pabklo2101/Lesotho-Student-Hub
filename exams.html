<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGCSE/COSC Exam Simulator | Lesotho Student Hub</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; padding: 1rem; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: white; border-radius: 18px; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.07); }
        h2, h3 { color: #1e40af; }
        .btn { background: #1e40af; color: white; border: none; padding: 0.8rem 1.6rem; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 0.9rem; margin: 0.5rem 0; border-radius: 12px; border: 1px solid #e2e8f0; background: #f1f5f9; cursor: pointer; }
        .option-btn:hover { background: #1e40af; color: white; }
        .correct { background: #10b981!important; color: white; }
        .wrong { background: #ef4444!important; color: white; }
        .progress { height: 8px; background: #e2e8f0; border-radius: 10px; margin: 1rem 0; }
        .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #1e40af, #0ea5e9); }
        .timer { font-size: 1.2rem; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <h2>📝 LGCSE / COSC Exam Practice</h2>
    <div style="background:#eef2ff; padding:1rem; border-radius:12px; margin-bottom:1.5rem;">
        <h3>🌟 Daily Challenge</h3>
        <p id="dailyQ"></p>
        <div id="dailyOpts"></div>
        <p id="dailyFeedback" style="font-weight:600;"></p>
    </div>
    <div id="setup">
        <label>Subject:</label>
        <select id="subjectSelect"></select>
        <label style="margin-left:1rem;">Duration (min):</label>
        <input type="number" id="timeInput" value="10" min="1" max="60" style="width:80px;">
        <button class="btn" id="startExamBtn" style="margin-left:1rem;">Start Exam</button>
    </div>
    <div id="examArea" style="display:none;">
        <div style="display:flex; justify-content:space-between;">
            <span id="qCounter"></span>
            <span class="timer" id="timerDisplay">⏱ 10:00</span>
        </div>
        <div class="progress"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <h3 id="questionText"></h3>
        <div id="optionsContainer"></div>
        <p id="examFeedback" style="font-weight:600;"></p>
        <button class="btn" id="nextBtn" style="display:none;" onclick="nextQuestion()">Next →</button>
    </div>
    <div id="resultArea" style="display:none;">
        <h2>🏁 Exam Finished!</h2>
        <p id="scoreText"></p>
        <button class="btn" onclick="location.reload()">Try Again</button>
    </div>
</div>
<script src="lgcse_questions.js"></script>
<script>
    const subjectSelect = document.getElementById('subjectSelect');
    for (const subj in LGCSE_BANK) {
        const opt = document.createElement('option');
        opt.value = subj;
        opt.textContent = subj.charAt(0).toUpperCase() + subj.slice(1);
        subjectSelect.appendChild(opt);
    }

    // daily challenge
    const subjects = Object.keys(LGCSE_BANK);
    const todayStr = new Date().toISOString().slice(0,10);
    let hash = 0;
    for (let i=0; i<todayStr.length; i++) hash = ((hash<<5)-hash) + todayStr.charCodeAt(i);
    hash = Math.abs(hash);
    const dailySubj = subjects[hash % subjects.length];
    const dailyQArr = LGCSE_BANK[dailySubj];
    const dailyQ = dailyQArr[hash % dailyQArr.length];
    document.getElementById('dailyQ').innerHTML = `<strong>${dailySubj.toUpperCase()}:</strong> ${dailyQ.q}`;
    const dailyOptsDiv = document.getElementById('dailyOpts');
    dailyOptsDiv.innerHTML = dailyQ.opts.map((opt, i) => `<button class="option-btn" onclick="submitDaily(${i}, this)">${opt}</button>`).join('');
    let dailyDone = false;
    function submitDaily(chosen, btn) {
        if (dailyDone) return;
        dailyDone = true;
        const correct = dailyQ.ans;
        document.querySelectorAll('#dailyOpts .option-btn').forEach((b, i) => {
            b.disabled = true;
            if (i === correct) b.classList.add('correct');
            else if (i === chosen) b.classList.add('wrong');
        });
        document.getElementById('dailyFeedback').innerText = chosen === correct ? '✅ Correct!' : `❌ Correct answer: ${dailyQ.opts[correct]}`;
    }

    // full exam
    let questions, index, score, timerId, timeLeft, answered;
    document.getElementById('startExamBtn').onclick = () => {
        const subj = subjectSelect.value;
        const mins = parseInt(document.getElementById('timeInput').value) || 10;
        if (!LGCSE_BANK[subj]) return;
        questions = [...LGCSE_BANK[subj]].sort(() => Math.random() - 0.5);
        index = 0;
        score = 0;
        timeLeft = mins * 60;
        answered = false;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('examArea').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';
        document.querySelector('[style*="background:#eef2ff"]').style.display = 'none';
        document.getElementById('timerDisplay').innerText = `⏱ ${mins}:00`;
        timerId = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timerDisplay').innerText = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
            if (timeLeft <= 0) { clearInterval(timerId); finishExam(); }
        }, 1000);
        showQuestion();
    };
    function showQuestion() {
        if (index >= questions.length) { clearInterval(timerId); finishExam(); return; }
        answered = false;
        const q = questions[index];
        document.getElementById('qCounter').innerText = `Question ${index+1} of ${questions.length}`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('progressFill').style.width = (index/questions.length*100)+'%';
        document.getElementById('examFeedback').innerText = '';
        document.getElementById('nextBtn').style.display = 'none';
        const optsDiv = document.getElementById('optionsContainer');
        optsDiv.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(i);
            optsDiv.appendChild(btn);
        });
    }
    function selectAnswer(chosen) {
        if (answered) return;
        answered = true;
        const correct = questions[index].ans;
        document.querySelectorAll('#optionsContainer .option-btn').forEach((b, i) => {
            b.disabled = true;
            if (i === correct) b.classList.add('correct');
            else if (i === chosen) b.classList.add('wrong');
        });
        if (chosen === correct) { score++; document.getElementById('examFeedback').innerText = '✅ Correct!'; }
        else { document.getElementById('examFeedback').innerText = `❌ Correct answer: ${questions[index].opts[correct]}`; }
        document.getElementById('nextBtn').style.display = 'inline-block';
    }
    function nextQuestion() { index++; showQuestion(); }
    function finishExam() {
        clearInterval(timerId);
        document.getElementById('examArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        const pct = Math.round((score/questions.length)*100);
        document.getElementById('scoreText').innerHTML = `You scored <strong>${score}/${questions.length}</strong> (${pct}%).`;
    }
</script>
</body>
          </html>
