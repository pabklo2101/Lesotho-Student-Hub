<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGCSE / COSC Tough Exam | Lesotho Student Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Load the massive question bank -->
    <script src="lgcse_questions.js"></script>
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text: #1E293B;
            --primary: #4F46E5;
            --accent: #06B6D4;
            --success: #10B981;
            --danger: #EF4444;
            --border: #E2E8F0;
            --radius: 20px;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --font: 'Inter', sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 1rem;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            margin-top: 1rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }
        .timer-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.7rem 2rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            box-shadow: var(--shadow);
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.8rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
            font-size: 1rem;
        }
        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.9rem 1.2rem;
            margin: 0.4rem 0;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-weight: 500;
            transition: 0.15s;
            color: var(--text);
        }
        .option-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .option-btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        .option-btn.wrong {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.75;
        }
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: width 0.3s;
        }
        .feedback {
            margin-top: 1rem;
            font-weight: 600;
            min-height: 1.5rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }
        .question-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 1rem;
        }
        .palette-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .palette-dot.answered {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .palette-dot.current {
            border: 2px solid var(--accent);
            box-shadow: 0 0 10px rgba(6,182,212,0.3);
        }
        .setup-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            max-width: 500px;
            margin: 2rem auto;
        }
        .setup-card h2 {
            margin-bottom: 1rem;
            color: var(--primary);
        }
        label {
            display: block;
            font-weight: 600;
            margin: 0.8rem 0 0.3rem;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-weight: 500;
            font-family: var(--font);
        }
        .result {
            text-align: center;
        }
        .result h2 {
            color: var(--primary);
            font-size: 2rem;
        }
        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1.5rem auto;
            color: var(--primary);
            background: var(--surface);
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .timer-box {
                font-size: 1.3rem;
                padding: 0.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SETUP SCREEN -->
        <div id="setupScreen">
            <div class="setup-card">
                <h2><i class="fas fa-file-alt"></i> Tough LGCSE / COSC Exam</h2>
                <p style="color: var(--text-secondary);">Hard questions, strict time limit, no going back after answering.</p>

                <label for="examSubject">Subject:</label>
                <select id="examSubject">
                    <option value="math">Mathematics</option>
                    <option value="english">English</option>
                    <option value="science">Science</option>
                    <option value="history">History</option>
                    <option value="geography">Geography</option>
                    <option value="sesotho">Sesotho</option>
                    <option value="business">Business</option>
                    <option value="tech">Tech / ICT</option>
                    <option value="agriculture">Agriculture</option>
                    <option value="devstudies">Development Studies</option>
                    <option value="re">Religious Education</option>
                </select>

                <label for="examDuration">Duration (minutes):</label>
                <input type="number" id="examDuration" value="30" min="10" max="180" step="5">

                <label for="questionCount">Number of questions:</label>
                <input type="number" id="questionCount" value="20" min="10" max="50">

                <button class="btn" onclick="startExam()" style="margin-top:1.5rem; width:100%; justify-content:center;">
                    <i class="fas fa-play"></i> Begin Exam
                </button>
            </div>
        </div>

        <!-- EXAM SCREEN (hidden initially) -->
        <div id="examScreen" style="display:none;">
            <div class="header">
                <h1 id="examTitle">Mathematics</h1>
                <div class="timer-box" id="timerDisplay">30:00</div>
            </div>

            <div class="card">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>

                <div id="questionText" style="font-size:1.3rem; font-weight:600; margin-bottom:1.2rem;"></div>
                <div id="optionsContainer"></div>
                <div class="feedback" id="feedback"></div>

                <div class="nav-buttons">
                    <button class="btn btn-outline" id="prevBtn" style="display:none;" onclick="prevQuestion()">
                        <i class="fas fa-arrow-left"></i> Previous
                    </button>
                    <span id="questionCounter" style="font-weight:600;"></span>
                    <button class="btn" id="nextBtn" onclick="nextQuestion()">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="btn" id="submitExamBtn" style="display:none;" onclick="submitExam()">
                        <i class="fas fa-check-circle"></i> Submit Exam
                    </button>
                </div>
            </div>

            <div class="question-palette" id="questionPalette"></div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="resultScreen" style="display:none;">
            <div class="card result">
                <h2><i class="fas fa-trophy"></i> Exam Finished!</h2>
                <div class="score-circle" id="scorePercent">0%</div>
                <p id="scoreText" style="font-size:1.2rem;"></p>
                <button class="btn" onclick="location.reload()">
                    <i class="fas fa-redo"></i> Try Another Exam
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // STRICT-MODE EXAM LOGIC
        // ============================================================
        let examQuestions = [];          // array of question objects
        let currentIndex = 0;           // index of currently displayed question
        let userAnswers = [];           // stores chosen option index for each question (-1 = unanswered)
        let timerInterval = null;
        let timeLeft = 0;               // in seconds
        let strictMode = true;          // cannot go back after answering
        let examSubmitted = false;

        // Shuffle an array in place (Fisher-Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ===================== START EXAM =====================
        window.startExam = () => {
            const subj = document.getElementById('examSubject').value;
            const duration = parseInt(document.getElementById('examDuration').value) || 30;
            const count = parseInt(document.getElementById('questionCount').value) || 20;

            // Build the question pool: prefer hard, then medium, then easy
            let pool = [];
            ['hard', 'medium', 'easy'].forEach(diff => {
                if (QUESTION_BANK[subj] && QUESTION_BANK[subj][diff]) {
                    pool = pool.concat(QUESTION_BANK[subj][diff]);
                }
            });

            if (pool.length === 0) {
                alert('No questions available for this subject. Please choose another subject.');
                return;
            }

            // Shuffle the pool and take the requested number of questions
            pool = shuffleArray(pool).slice(0, count);
            examQuestions = pool;
            userAnswers = new Array(examQuestions.length).fill(-1);
            currentIndex = 0;
            timeLeft = duration * 60;
            examSubmitted = false;

            // Show exam screen, hide others
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';

            // Set the exam title
            const subjectSelect = document.getElementById('examSubject');
            document.getElementById('examTitle').textContent = subjectSelect.options[subjectSelect.selectedIndex].text;

            // Render first question, start timer, render palette
            renderQuestion();
            startTimer();
            renderPalette();
        };

        // ===================== TIMER =====================
        function startTimer() {
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam(); // auto-submit when time runs out
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
            // Change colour to red when less than 5 minutes remain
            if (timeLeft <= 300) {
                document.getElementById('timerDisplay').style.color = 'var(--danger)';
            } else {
                document.getElementById('timerDisplay').style.color = 'var(--primary)';
            }
        }

        // ===================== QUESTION RENDERING =====================
        function renderQuestion() {
            if (examQuestions.length === 0) return;
            const q = examQuestions[currentIndex];

            // Display question text
            document.getElementById('questionText').textContent = q.q;

            // Shuffle options if not already shuffled (store shuffled version on first render)
            if (!q.shuffledOptions) {
                const shuffled = shuffleArray(
                    q.opts.map((text, originalIdx) => ({ text, originalIdx }))
                );
                q.shuffledOptions = shuffled;
                q.correctShuffledIndex = shuffled.findIndex(opt => opt.originalIdx === q.ans);
            }

            const shuffled = q.shuffledOptions;
            const correctIdx = q.correctShuffledIndex;

            // Build option buttons
            const optsContainer = document.getElementById('optionsContainer');
            optsContainer.innerHTML = '';
            shuffled.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectAnswer(i);

                // If this question has already been answered, show result and disable
                if (userAnswers[currentIndex] === i) {
                    btn.classList.add(i === correctIdx ? 'correct' : 'wrong');
                    btn.disabled = true;
                }

                // In strict mode, if any answer was given, disable all options
                if (strictMode && userAnswers[currentIndex] !== -1) {
                    btn.disabled = true;
                }

                optsContainer.appendChild(btn);
            });

            // Update progress bar
            const progress = ((currentIndex) / examQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Update question counter
            document.getElementById('questionCounter').textContent =
                `Question ${currentIndex + 1} of ${examQuestions.length}`;

            // Show/hide navigation buttons based on strict mode and position
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitExamBtn');

            if (strictMode) {
                prevBtn.style.display = 'none';  // no going back in strict mode
            } else {
                prevBtn.style.display = currentIndex === 0 ? 'none' : 'inline-flex';
            }

            const isLast = currentIndex === examQuestions.length - 1;
            nextBtn.style.display = isLast ? 'none' : 'inline-flex';
            submitBtn.style.display = isLast ? 'inline-flex' : 'none';

            // Clear feedback if unanswered
            if (userAnswers[currentIndex] === -1) {
                document.getElementById('feedback').textContent = '';
            }

            // Update palette
            renderPalette();
        }

        // ===================== ANSWER HANDLING =====================
        function selectAnswer(chosenIdx) {
            // Prevent changing answer in strict mode
            if (strictMode && userAnswers[currentIndex] !== -1) return;
            if (examSubmitted) return;

            const q = examQuestions[currentIndex];
            const correctIdx = q.correctShuffledIndex;

            // Record answer
            userAnswers[currentIndex] = chosenIdx;

            // Update UI – show correct/wrong, disable all options
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === correctIdx) {
                    btn.classList.add('correct');
                } else if (i === chosenIdx) {
                    btn.classList.add('wrong');
                }
            });

            // Show feedback
            const feedbackEl = document.getElementById('feedback');
            if (chosenIdx === correctIdx) {
                feedbackEl.innerHTML = `<span style="color:#10B981;"><i class="fas fa-check-circle"></i> Correct! ${q.exp || ''}</span>`;
            } else {
                feedbackEl.innerHTML = `<span style="color:#EF4444;"><i class="fas fa-times-circle"></i> Incorrect. ${q.exp || ''}</span>`;
            }

            // In strict mode, auto‑advance after 1.5 seconds (unless it's the last question)
            if (strictMode && currentIndex < examQuestions.length - 1) {
                setTimeout(() => {
                    currentIndex++;
                    renderQuestion();
                }, 1500);
            } else if (!strictMode) {
                // In non‑strict mode, just re‑render to update buttons
                renderQuestion();
            }
        }

        // ===================== NAVIGATION =====================
        window.prevQuestion = () => {
            if (strictMode) return;  // not allowed
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        window.nextQuestion = () => {
            if (currentIndex < examQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        };

        // ===================== PALETTE (question overview) =====================
        function renderPalette() {
            const palette = document.getElementById('questionPalette');
            palette.innerHTML = '';

            examQuestions.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = 'palette-dot';

                if (userAnswers[i] !== -1) {
                    dot.classList.add('answered');
                }
                if (i === currentIndex) {
                    dot.classList.add('current');
                }

                dot.textContent = i + 1;
                dot.title = `Question ${i + 1}`;

                dot.onclick = () => {
                    // In strict mode, you cannot jump to a question that has already been answered
                    if (strictMode && userAnswers[i] !== -1 && i !== currentIndex) {
                        alert('You cannot go back to a question you have already answered in strict mode.');
                        return;
                    }
                    // Move to that question
                    currentIndex = i;
                    renderQuestion();
                };

                palette.appendChild(dot);
            });
        }

        // ===================== SUBMIT EXAM =====================
        window.submitExam = () => {
            if (examSubmitted) return;
            examSubmitted = true;
            clearInterval(timerInterval);

            let correctCount = 0;
            examQuestions.forEach((q, i) => {
                if (userAnswers[i] === q.correctShuffledIndex) {
                    correctCount++;
                }
            });

            const total = examQuestions.length;
            const percent = Math.round((correctCount / total) * 100);

            // Show result screen
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scorePercent').textContent = percent + '%';

            let message = '';
            if (percent >= 80) {
                message = '🎉 Excellent work! You are well prepared.';
            } else if (percent >= 60) {
                message = '👍 Good effort. Keep revising the topics you missed.';
            } else if (percent >= 40) {
                message = '📚 More practice is needed. Focus on the explanations.';
            } else {
                message = '💪 Don’t give up! Review the study guides and try again.';
            }

            document.getElementById('scoreText').innerHTML = `
                You scored <strong>${correctCount}</strong> out of <strong>${total}</strong> (${percent}%).<br>
                ${message}
            `;
        };
    </script>
</body>
    </html>
