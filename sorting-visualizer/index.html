<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 Sorting Algorithm Visualizer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="arraySize">Array Size:</label>
                <input type="range" id="arraySize" min="10" max="200" value="50">
                <span id="sizeDisplay">50</span>
            </div>
            
            <div class="control-group">
                <label for="speed">Speed (ms):</label>
                <input type="range" id="speed" min="1" max="100" value="50">
                <span id="speedDisplay">50ms</span>
            </div>
            
            <div class="control-group">
                <label for="algorithm">Algorithm:</label>
                <select id="algorithm">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
            </div>
            
            <div class="button-group">
                <button id="startBtn" class="btn btn-start">Start</button>
                <button id="resetBtn" class="btn btn-reset">Reset</button>
                <button id="randomBtn" class="btn btn-random">Randomize</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <span>Comparisons:</span>
                <span id="comparisons">0</span>
            </div>
            <div class="stat-item">
                <span>Swaps:</span>
                <span id="swaps">0</span>
            </div>
            <div class="stat-item">
                <span>Time:</span>
                <span id="time">0ms</span>
            </div>
            <div class="stat-item">
                <span>Status:</span>
                <span id="status">Ready</span>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
    </div>
    
    <script src="algorithms.js"></script>
    <script src="visualizer.js"></script>
</body>
</html>
